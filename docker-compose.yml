# 智能内容分析系统 - 统一 Docker Compose 编排
# 使用 profiles 区分环境：
#   - dev: 开发环境（本地调试，暴露端口）
#   - nas: 生产环境（NAS 部署，资源限制，含定时调度）
#
# 启动方式：
#   开发环境: docker compose --profile dev up -d
#   生产环境: docker compose --profile nas up -d
#
# bilibili-monitor 按需启动（非常驻服务）：
#   docker compose run --rm bilibili-monitor
#
# bilibili-cron（定时调度，仅 nas profile）：
#   每 6 小时自动运行 bilibili-monitor，无需手动干预

services:
  # ============ 基础设施服务 ============

  # ChromaDB 向量数据库（video_knowledge 专用）
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    profiles: [dev, nas]
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============ 核心业务服务 ============

  # Text-to-SQL 服务（结构化查询）
  text-to-sql:
    build:
      context: ./text-to-sql
      dockerfile: Dockerfile
    container_name: text-to-sql
    profiles: [dev, nas]
    ports:
      - "8010:8010"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/anthropic}
      - DATABASE_PATH=/app/data/content.db
    volumes:
      - duckdb-data:/app/data
    restart: unless-stopped
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # RAG 服务（语义检索）
  rag:
    build:
      context: .
      dockerfile: personal-knowledge-rag/Dockerfile
    container_name: rag
    profiles: [dev, nas]
    ports:
      - "8090:8090"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
      - BASE_URL=${BASE_URL:-https://api.minimaxi.com/anthropic}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${RAG_LLM_MODEL:-deepseek-v4-pro}
      - REFINE_API_KEY=${REFINE_API_KEY}
      - REFINE_API_URL=${REFINE_API_URL}
      - REFINE_MODEL=${REFINE_MODEL:-deepseek-v4-flash}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - VIDEO_KNOWLEDGE_DIR=/app/video_knowledge
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K=${TOP_K:-5}
    volumes:
      - ./personal-knowledge-rag/video_knowledge:/app/video_knowledge
      - ./personal-knowledge-rag/chroma_db:/app/chroma_db
      - ./personal-knowledge-rag/logs:/app/logs
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Router Agent（路由分发）
  router-agent:
    build:
      context: ./router-agent
      dockerfile: Dockerfile
    container_name: router-agent
    profiles: [dev, nas]
    ports:
      - "8000:8000"
    environment:
      - CHAT_API_KEY=${MINIMAX_API_KEY}
      - CHAT_API_URL=https://api.minimaxi.com/anthropic
      - CHAT_MODEL=${LLM_MODEL:-MiniMax-M2.7}
      - SQL_SERVICE_URL=http://text-to-sql:8010
      - RAG_SERVICE_URL=http://rag:8090
      - DUCKDB_PATH=/app/data/content.db
      - DATA_DIR=/app/data  # QueryLogger 独立数据库路径
      - REQUEST_TIMEOUT=120  # LLM 调用超时（首次请求可能较慢）
      - BILIBILI_CONFIG_DIR=/app/bilibili-config  # UP主配置目录
      - BILIBILI_DATA_DIR=/app/bilibili-data  # ASR 设置/用量存储
      # 透传 bilibili-monitor 所需环境变量（用于触发采集）
      - BILIBILI_COOKIE=${BILIBILI_COOKIE}
      - QQ_BOT_URL=${QQ_BOT_URL}
      - QQ_USER_ID=${QQ_USER_ID}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - REFINE_API_URL=${REFINE_API_URL}
      - REFINE_API_KEY=${REFINE_API_KEY}
      - REFINE_MODEL=${REFINE_MODEL:-deepseek-v4-flash}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - GPU_SERVICE_URL=${GPU_SERVICE_URL:-}  # 开发机: http://gpu-service:8011，NAS: 空
      - PROJECT_DIR=${PROJECT_DIR:-}  # 项目根目录（宿主机路径，用于挂载 transcripts/chromadb）
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    volumes:
      - duckdb-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket（用于触发 bilibili-monitor）
      - ./bilibili-monitor/config:/app/bilibili-config  # UP主配置目录
      - bilibili-data:/app/bilibili-data  # ASR 设置/用量 + 音频文件访问
    depends_on:
      text-to-sql:
        condition: service_healthy
      rag:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============ 前端服务 ============

  # 前端（Nginx 反向代理）
  frontend:
    build:
      context: ./text-to-sql/frontend
      dockerfile: Dockerfile
    container_name: frontend
    profiles: [dev, nas]
    ports:
      - "80:80"
    volumes:
      - ./text-to-sql/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - router-agent
      - text-to-sql
    restart: unless-stopped
    mem_limit: 256m

  # GPU 转录服务（开发机专用，CUDA 直通）
  # 仅 dev profile 启用，NAS 无 GPU 不需要
  gpu-service:
    build:
      context: ./bilibili-monitor
      dockerfile: Dockerfile.gpu
    container_name: gpu-service
    profiles: [dev]
    ports:
      - "8011:8011"
    volumes:
      # 挂载飞牛 Sync 同步目录（开发机本地路径）
      - ${GPU_DOWNLOADS_DIR:-./bilibili-monitor/downloads}:/sync/downloads
      - ${GPU_TRANSCRIPTS_DIR:-./bilibili-monitor/transcripts}:/sync/transcripts
      # 共享 bilibili-monitor 的下载和转写目录（用于采集触发时的 GPU 转写委托）
      - bilibili-data:/app/downloads
      - bilibili-data:/root/B站监控  # 实际下载目录（YAML 配置的 download_root）
      - ./bilibili-monitor/transcripts:/app/transcripts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - HF_ENDPOINT=https://hf-mirror.com
    restart: unless-stopped
    mem_limit: 4g

  # ============ 按需服务（非常驻） ============

  # bilibili-monitor（B站视频下载+转写+精炼）
  # 注意：此服务仅用于构建镜像，实际采集通过前端按钮触发
  # 不要在此服务启动时自动运行 monitor_all.py
  bilibili-monitor:
    build:
      context: .
      dockerfile: bilibili-monitor/Dockerfile
    container_name: bilibili-monitor
    profiles: [dev, nas]
    environment:
      - BILIBILI_COOKIE=${BILIBILI_COOKIE}
      - QQ_BOT_URL=${QQ_BOT_URL}
      - QQ_USER_ID=${QQ_USER_ID}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - REFINE_API_URL=${REFINE_API_URL}
      - REFINE_API_KEY=${REFINE_API_KEY}
      - REFINE_MODEL=${REFINE_MODEL:-deepseek-v4-flash}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - DATABASE_PATH=/app/data/content.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - BILIBILI_CONFIG_DIR=/app/bilibili-config
    volumes:
      - bilibili-data:/app/downloads
      - ./bilibili-monitor/transcripts:/app/transcripts
      - ./bilibili-monitor/chromadb:/app/chromadb
      - duckdb-data:/app/data
      - ./bilibili-monitor/config:/app/bilibili-config
    depends_on:
      chromadb:
        condition: service_healthy
    restart: "no"
    mem_limit: 4g
    # 覆盖 Dockerfile 的 CMD：此服务仅用于构建镜像，不自动运行采集
    command: ["echo", "bilibili-monitor 镜像就绪，等待前端触发采集..."]

  # bilibili-monitor 定时调度（每 6 小时自动运行）
  # 使用 docker:cli 镜像 + crond，挂载 Docker socket 调度 bilibili-monitor
  # 仅 NAS 生产环境启用（profile: nas）
  bilibili-cron:
    image: docker:cli
    container_name: bilibili-cron
    profiles: [nas]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
      - ./bilibili-monitor/cron_entry.sh:/usr/local/bin/cron_entry.sh:ro
      - bilibili-cron-logs:/var/log
    entrypoint: /bin/sh
    command: >
      -c "
        apk add --no-cache bash > /dev/null 2>&1;
        chmod +x /usr/local/bin/cron_entry.sh;
        echo '17 */6 * * * /usr/local/bin/cron_entry.sh' > /etc/crontabs/root;
        echo '[bilibili-cron] 定时任务已启动（每6小时运行，:17 触发）';
        crond -f -l 2
      "
    restart: unless-stopped
    mem_limit: 128m

volumes:
  # DuckDB 数据库（bilibili-monitor 写，text-to-sql 读，router-agent 读）
  duckdb-data:
    driver: local

  # ChromaDB 向量数据（bilibili-monitor 写，rag 读）
  chromadb-data:
    driver: local

  # B站原始数据（音频、转写文本、checkpoint）
  bilibili-data:
    driver: local

  # bilibili-cron 定时任务日志
  bilibili-cron-logs:
    driver: local
